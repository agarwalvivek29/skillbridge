name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ─── Detect which services/apps changed ───────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
      python: ${{ steps.filter.outputs.python }}
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            typescript:
              - 'apps/**/*.ts'
              - 'apps/**/*.tsx'
              - 'services/**/*.ts'
            python:
              - 'services/**/*.py'
              - 'packages/**/*.py'
            go:
              - 'services/**/*.go'
            rust:
              - 'services/**/src/**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # ─── TypeScript / JavaScript ──────────────────────────────────────────────
  lint-typescript:
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run type-check

  # ─── Python ───────────────────────────────────────────────────────────────
  lint-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - run: uv python install 3.12
      - name: Run ruff linter
        run: uvx ruff check services/ packages/ --exclude packages/schema/generated/
      - name: Run ruff formatter check
        run: uvx ruff format --check services/ packages/ --exclude packages/schema/generated/
      - name: Run mypy type checker
        run: |
          for service_dir in services/*/; do
            if [ -f "${service_dir}pyproject.toml" ]; then
              echo "Checking ${service_dir}"
              uv run --directory "${service_dir}" --extra dev mypy .
            fi
          done

  # ─── Go ───────────────────────────────────────────────────────────────────
  lint-go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: .

  # ─── Rust ─────────────────────────────────────────────────────────────────
  lint-rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  # ─── Test: TypeScript ────────────────────────────────────────────────────
  test-typescript:
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run unit tests
        run: pnpm run test:unit --reporter=verbose
      - name: Run e2e tests
        run: pnpm run test:e2e

  # ─── Test: Python ─────────────────────────────────────────────────────────
  test-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - run: uv python install 3.12
      - name: Run unit tests
        run: |
          for service_dir in services/*/; do
            if [ -f "${service_dir}pyproject.toml" ] && [ -d "${service_dir}tests/unit" ]; then
              echo "Testing ${service_dir}"
              uv run --directory "${service_dir}" --extra dev pytest tests/unit/ -v --tb=short
            fi
          done
      - name: Run e2e tests
        run: |
          for service_dir in services/*/; do
            if [ -f "${service_dir}pyproject.toml" ] && [ -d "${service_dir}tests/e2e" ]; then
              echo "E2E testing ${service_dir}"
              uv run --directory "${service_dir}" --extra dev pytest tests/e2e/ -v --tb=short
            fi
          done

  # ─── Test: Go ─────────────────────────────────────────────────────────────
  test-go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Run unit tests
        run: go test ./... -v -short
      - name: Run e2e tests
        run: go test ./tests/e2e/... -v -timeout 120s

  # ─── Test: Rust ───────────────────────────────────────────────────────────
  test-rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit tests
        run: cargo test --lib
      - name: Run e2e tests
        run: cargo test --test '*'

  # ─── Conventional Commits check ──────────────────────────────────────────
  commit-lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - name: commitlint
        run: pnpm dlx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose --config .commitlintrc.json
