syntax = "proto3";

package contracts.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/agarwalvivek29/skillbridge/packages/schema/generated/go/contracts/v1;contractsv1";

// ─── Enums ───────────────────────────────────────────────────────────────────

enum EscrowStatus {
  ESCROW_STATUS_UNSPECIFIED = 0;
  ESCROW_STATUS_DEPLOYING = 1;           // contract being deployed
  ESCROW_STATUS_FUNDED = 2;              // client deposited funds
  ESCROW_STATUS_PARTIALLY_RELEASED = 3;  // some milestones paid
  ESCROW_STATUS_SETTLED = 4;             // all milestones paid
  ESCROW_STATUS_DISPUTED = 5;            // active dispute, funds locked
  ESCROW_STATUS_REFUNDED = 6;            // cancelled, funds returned to client
}

// ─── Domain Entity ────────────────────────────────────────────────────────────

message EscrowContract {
  string id = 1;
  string gig_id = 2;
  // Deployed escrow PDA address on Solana (base58 format)
  string chain_address = 3;
  // "solana-mainnet-beta", "solana-devnet", or "solana-localnet"
  string network = 4;
  // Total amount locked — in lamports (SOL) or 6-decimal units (USDC)
  string total_amount = 5;
  // Amount released so far
  string released_amount = 6;
  EscrowStatus status = 7;
  // SOL: empty string (native asset). USDC: SPL token mint address on Solana (base58).
  string token_address = 8;
  // Platform fee in basis points (500 = 5%). Stored in the contract at deploy time.
  int32 platform_fee_basis_points = 9;
  // Computed platform fee amount (total_amount * platform_fee_basis_points / 10000)
  string platform_fee_amount = 10;
  // Solana wallet address (base58) that receives the platform fee on each completeMilestone call
  string platform_fee_recipient = 11;
  // Transaction hash of the funding tx
  string funding_tx_hash = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp funded_at = 14;
  google.protobuf.Timestamp settled_at = 15;
}

// ─── Events ──────────────────────────────────────────────────────────────────

message EscrowFundedEvent {
  string escrow_id = 1;
  string gig_id = 2;
  string chain_address = 3;
  string total_amount = 4;
  string token_address = 5;
  string funding_tx_hash = 6;
  google.protobuf.Timestamp occurred_at = 7;
}

message FundsReleasedEvent {
  string escrow_id = 1;
  string gig_id = 2;
  string milestone_id = 3;
  string freelancer_address = 4;
  // Amount received by freelancer (after platform fee deduction)
  string net_amount = 5;
  string platform_fee_amount = 6;
  string tx_hash = 7;
  google.protobuf.Timestamp occurred_at = 8;
}

// ─── API Shapes ───────────────────────────────────────────────────────────────

message GetEscrowRequest {
  string gig_id = 1;
}

message ReleaseMilestoneFundsRequest {
  string gig_id = 1;
  string milestone_id = 2;
  int32 contract_milestone_index = 3;
}

message GetEscrowResponse {
  EscrowContract escrow = 1;
}

message ReleaseMilestoneFundsResponse {
  EscrowContract escrow = 1;
}

// ─── Service ─────────────────────────────────────────────────────────────────

service EscrowService {
  rpc GetEscrow(GetEscrowRequest) returns (GetEscrowResponse);
  rpc ReleaseMilestoneFunds(ReleaseMilestoneFundsRequest) returns (ReleaseMilestoneFundsResponse);
}
