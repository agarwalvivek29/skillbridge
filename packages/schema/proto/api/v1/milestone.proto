syntax = "proto3";

package api.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/agarwalvivek29/skillbridge/packages/schema/generated/go/api/v1;apiv1";

// ─── Enums ───────────────────────────────────────────────────────────────────

enum MilestoneStatus {
  MILESTONE_STATUS_UNSPECIFIED = 0;
  MILESTONE_STATUS_PENDING = 1;            // waiting for freelancer to start
  MILESTONE_STATUS_SUBMITTED = 2;          // freelancer submitted, awaiting review
  MILESTONE_STATUS_UNDER_REVIEW = 3;       // AI review in progress
  MILESTONE_STATUS_APPROVED = 4;           // approved, fund release triggered
  MILESTONE_STATUS_REVISION_REQUESTED = 5; // client or AI rejected, awaiting resubmission
  MILESTONE_STATUS_PAID = 6;               // funds released on-chain
  MILESTONE_STATUS_DISPUTED = 7;           // dispute raised, funds locked
}

// ─── Domain Entity ────────────────────────────────────────────────────────────

message Milestone {
  string id = 1;
  string gig_id = 2;
  string title = 3;
  string description = 4;
  // Acceptance criteria in markdown — fed directly to the AI reviewer as the evaluation spec
  string acceptance_criteria = 5;
  // Amount in wei (ETH) or smallest unit (USDC). Must sum to gig.total_amount.
  string amount = 6;
  // 1-indexed position within the gig
  int32 order = 7;
  MilestoneStatus status = 8;
  // Position in the on-chain contract milestones array (0-indexed)
  int32 contract_index = 9;
  // How many revision cycles have happened on this milestone
  int32 revision_count = 10;
  // Optional per-milestone deadline
  google.protobuf.Timestamp due_date = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

// ─── Events ──────────────────────────────────────────────────────────────────

message MilestoneSubmittedEvent {
  string milestone_id = 1;
  string gig_id = 2;
  string freelancer_id = 3;
  google.protobuf.Timestamp occurred_at = 4;
}

message MilestoneApprovedEvent {
  string milestone_id = 1;
  string gig_id = 2;
  string freelancer_id = 3;
  string amount = 4;
  google.protobuf.Timestamp occurred_at = 5;
}

message MilestoneDisputedEvent {
  string milestone_id = 1;
  string gig_id = 2;
  string raised_by_user_id = 3;
  google.protobuf.Timestamp occurred_at = 4;
}

// ─── API Shapes ───────────────────────────────────────────────────────────────

message CreateMilestoneRequest {
  string gig_id = 1;
  string title = 2;
  string description = 3;
  string acceptance_criteria = 4;
  string amount = 5;
  int32 order = 6;
  google.protobuf.Timestamp due_date = 7;
}

message GetMilestonesRequest {
  string gig_id = 1;
}

message GetMilestonesResponse {
  repeated Milestone milestones = 1;
}

message ApproveMilestoneRequest {
  string milestone_id = 1;
  string notes = 2;
}

message RequestRevisionRequest {
  string milestone_id = 1;
  string feedback = 2;
}

// ─── Service ─────────────────────────────────────────────────────────────────

service MilestoneService {
  rpc CreateMilestone(CreateMilestoneRequest) returns (Milestone);
  rpc GetMilestones(GetMilestonesRequest) returns (GetMilestonesResponse);
  rpc ApproveMilestone(ApproveMilestoneRequest) returns (Milestone);
  rpc RequestRevision(RequestRevisionRequest) returns (Milestone);
}
