syntax = "proto3";

package api.v1;

import "common/v1/pagination.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/agarwalvivek29/skillbridge/packages/schema/generated/go/api/v1;apiv1";

// ─── Enums ───────────────────────────────────────────────────────────────────

enum GigStatus {
  GIG_STATUS_UNSPECIFIED = 0;
  GIG_STATUS_DRAFT = 1;       // created, not yet funded
  GIG_STATUS_OPEN = 2;        // funded, accepting proposals
  GIG_STATUS_IN_PROGRESS = 3; // freelancer assigned, work underway
  GIG_STATUS_COMPLETED = 4;   // all milestones paid
  GIG_STATUS_CANCELLED = 5;   // cancelled before completion
  GIG_STATUS_DISPUTED = 6;    // active dispute on a milestone
}

enum Currency {
  CURRENCY_UNSPECIFIED = 0;
  CURRENCY_ETH = 1;
  CURRENCY_USDC = 2;
}

// ─── Domain Entity ────────────────────────────────────────────────────────────

message Gig {
  string id = 1;
  string client_id = 2;
  string freelancer_id = 3;    // empty until a proposal is accepted
  string title = 4;
  string description = 5;
  // Total budget in wei (ETH) or smallest unit (USDC = 6 decimals)
  string total_amount = 6;
  Currency currency = 7;
  // For USDC: the ERC-20 contract address on Base L2.
  // For ETH: empty (native asset, no contract).
  string token_address = 8;
  // Solana escrow PDA — set after client funds
  string escrow_pda = 9;
  GigStatus status = 10;
  repeated string tags = 11;
  repeated string required_skills = 12;
  // Optional hard deadline for the full gig
  google.protobuf.Timestamp deadline = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
  string client_name = 16;
  string client_avatar_url = 17;
  string client_wallet_address = 18;
}

// ─── Events ──────────────────────────────────────────────────────────────────

message GigCreatedEvent {
  string gig_id = 1;
  string client_id = 2;
  string title = 3;
  google.protobuf.Timestamp occurred_at = 4;
}

message GigFundedEvent {
  string gig_id = 1;
  string client_id = 2;
  string contract_address = 3;
  string total_amount = 4;
  Currency currency = 5;
  google.protobuf.Timestamp occurred_at = 6;
}

message GigCompletedEvent {
  string gig_id = 1;
  string client_id = 2;
  string freelancer_id = 3;
  google.protobuf.Timestamp occurred_at = 4;
}

// ─── API Shapes ───────────────────────────────────────────────────────────────

message CreateGigRequest {
  string title = 1;
  string description = 2;
  string total_amount = 3;
  Currency currency = 4;
  string token_address = 5;  // required if currency = USDC
  repeated string tags = 6;
  repeated string required_skills = 7;
  google.protobuf.Timestamp deadline = 8;
}

message GetGigRequest {
  string id = 1;
}

message GetGigsRequest {
  common.v1.PaginationRequest pagination = 1;
  GigStatus status_filter = 2;
  string client_id_filter = 3;
  string freelancer_id_filter = 4;
  Currency currency_filter = 5;
  // Filter by required skill
  string skill_filter = 6;
}

message GetGigsResponse {
  repeated Gig gigs = 1;
  common.v1.PaginationMeta pagination = 2;
}

message AssignFreelancerRequest {
  string gig_id = 1;
  string freelancer_id = 2;
}

message CreateGigResponse {
  Gig gig = 1;
}

message GetGigResponse {
  Gig gig = 1;
}

message AssignFreelancerResponse {
  Gig gig = 1;
}

// ─── Service ─────────────────────────────────────────────────────────────────

service GigService {
  rpc CreateGig(CreateGigRequest) returns (CreateGigResponse);
  rpc GetGig(GetGigRequest) returns (GetGigResponse);
  rpc GetGigs(GetGigsRequest) returns (GetGigsResponse);
  rpc AssignFreelancer(AssignFreelancerRequest) returns (AssignFreelancerResponse);
}
