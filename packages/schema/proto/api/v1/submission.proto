syntax = "proto3";

package api.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/agarwalvivek29/skillbridge/packages/schema/generated/go/api/v1;apiv1";

// ─── Enums ───────────────────────────────────────────────────────────────────

enum SubmissionStatus {
  SUBMISSION_STATUS_UNSPECIFIED = 0;
  SUBMISSION_STATUS_PENDING = 1;       // submitted, waiting for review job to start
  SUBMISSION_STATUS_UNDER_REVIEW = 2;  // AI review in progress
  SUBMISSION_STATUS_APPROVED = 3;      // passed AI review or manually approved
  SUBMISSION_STATUS_REJECTED = 4;      // failed AI review or manually rejected
}

// ─── Domain Entity ────────────────────────────────────────────────────────────

message Submission {
  string id = 1;
  string milestone_id = 2;
  string freelancer_id = 3;
  // Repository URL (GitHub, GitLab, etc.)
  string repo_url = 4;
  // S3 keys for uploaded files (screenshots, zips, docs, etc.)
  repeated string file_keys = 5;
  string notes = 6;
  SubmissionStatus status = 7;
  // 1-indexed. First submission = 1, each resubmission increments.
  int32 revision_number = 8;
  // Set if this is a resubmission — points to the prior submission
  string previous_submission_id = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

// ─── Events ──────────────────────────────────────────────────────────────────

message SubmissionCreatedEvent {
  string submission_id = 1;
  string milestone_id = 2;
  string freelancer_id = 3;
  string repo_url = 4;
  int32 revision_number = 5;
  google.protobuf.Timestamp occurred_at = 6;
}

message SubmissionReviewedEvent {
  string submission_id = 1;
  string milestone_id = 2;
  SubmissionStatus verdict = 3;
  google.protobuf.Timestamp occurred_at = 4;
}

// ─── API Shapes ───────────────────────────────────────────────────────────────

message CreateSubmissionRequest {
  string milestone_id = 1;
  string repo_url = 2;
  repeated string file_keys = 3;
  string notes = 4;
  // Set when resubmitting after a revision request
  string previous_submission_id = 5;
}

message GetSubmissionRequest {
  string id = 1;
}

message GetSubmissionsRequest {
  string milestone_id = 1;
}

message GetSubmissionsResponse {
  repeated Submission submissions = 1;
}

message CreateSubmissionResponse {
  Submission submission = 1;
}

message GetSubmissionResponse {
  Submission submission = 1;
}

// ─── Service ─────────────────────────────────────────────────────────────────

service SubmissionService {
  rpc CreateSubmission(CreateSubmissionRequest) returns (CreateSubmissionResponse);
  rpc GetSubmission(GetSubmissionRequest) returns (GetSubmissionResponse);
  rpc GetSubmissions(GetSubmissionsRequest) returns (GetSubmissionsResponse);
}
