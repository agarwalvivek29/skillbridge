syntax = "proto3";

package api.v1;

import "common/v1/pagination.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/agarwalvivek29/skillbridge/packages/schema/generated/go/api/v1;apiv1";

// ─── Enums ───────────────────────────────────────────────────────────────────

enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_SUSPENDED = 2;
}

// Mutually exclusive for now. A user is either a freelancer or a client.
enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_FREELANCER = 1;
  USER_ROLE_CLIENT = 2;
  USER_ROLE_ADMIN = 3;
}

// ─── Domain Entity ────────────────────────────────────────────────────────────

message User {
  string id = 1;
  string email = 2;
  string name = 3;
  string wallet_address = 4;
  UserStatus status = 5;
  UserRole role = 6;
  string avatar_url = 7;
  string bio = 8;
  // Freelancer-only fields (empty for clients)
  repeated string skills = 9;
  // Preferred hourly rate in wei (0 = not set)
  string hourly_rate_wei = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

// Safe public view — excludes password_hash and internal fields
message UserPublic {
  string id = 1;
  string name = 2;
  string wallet_address = 3;
  UserRole role = 4;
  string avatar_url = 5;
  string bio = 6;
  repeated string skills = 7;
  string hourly_rate_wei = 8;
  google.protobuf.Timestamp created_at = 9;
}

// ─── Events ──────────────────────────────────────────────────────────────────

message UserCreatedEvent {
  string user_id = 1;
  string email = 2;
  UserRole role = 3;
  google.protobuf.Timestamp occurred_at = 4;
}

// ─── API Shapes ───────────────────────────────────────────────────────────────

message CreateUserRequest {
  string email = 1;
  string name = 2;
  string wallet_address = 3;
  UserRole role = 4;
}

message UpdateUserRequest {
  string id = 1;
  string name = 2;
  string avatar_url = 3;
  string bio = 4;
  repeated string skills = 5;
  string hourly_rate_wei = 6;
}

message GetUserRequest {
  string id = 1;
}

message GetUsersRequest {
  common.v1.PaginationRequest pagination = 1;
  UserRole role_filter = 2;
  // Filter by skill (freelancer discovery)
  string skill_filter = 3;
}

message GetUsersResponse {
  repeated UserPublic users = 1;
  common.v1.PaginationMeta pagination = 2;
}

message CreateUserResponse {
  UserPublic user = 1;
}

message GetUserResponse {
  UserPublic user = 1;
}

message UpdateUserResponse {
  UserPublic user = 1;
}

// ─── Service ─────────────────────────────────────────────────────────────────

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
}
